name: Build and Push Jellyfin TitanOS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment (currently only stable)'
        required: true
        type: choice
        options:
          - stable

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: germancoding/jellyfin-titanos

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone jellyfin-titanos
        uses: actions/checkout@v6
        with:
          repository: GermanCoding/jellyfin-titanos
          ref: master
          submodules: recursive
          path: jellyfin-titanos

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: jellyfin-titanos
          file: jellyfin-titanos/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
